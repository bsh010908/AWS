name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-northeast-2 \
          | docker login \
          --username AWS \
          --password-stdin 522614117606.dkr.ecr.ap-northeast-2.amazonaws.com

      - name: Build ledger-service
        run: |
          docker build -t ledger-service ./ledger-service
          docker tag ledger-service:latest 522614117606.dkr.ecr.ap-northeast-2.amazonaws.com/ledger-service:latest

      - name: Push image
        run: |
          docker push 522614117606.dkr.ecr.ap-northeast-2.amazonaws.com/ledger-service:latest
