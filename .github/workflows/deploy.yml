name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-2
      ECR_REGISTRY: 522614117606.dkr.ecr.ap-northeast-2.amazonaws.com
      ECR_REPOSITORY: ledger-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build ledger-service
        run: |
          docker build -t ledger-service ./services/ledger-service
          docker tag ledger-service:latest $ECR_REGISTRY/ledger-service:latest

      - name: Push ledger-service
        run: |
          docker push $ECR_REGISTRY/ledger-service:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.180.56.115
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/AWS

            docker pull 522614117606.dkr.ecr.ap-northeast-2.amazonaws.com/ledger-service:latest

            docker-compose down

            docker-compose build frontend

            docker-compose up -d