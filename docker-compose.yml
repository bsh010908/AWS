services:

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d   # 🔥 이 줄 추가

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "8001:8000"
    env_file:
      - ./services/auth-service/.env
    environment:
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    depends_on:
      - mysql

  ledger-service:
    build: ./services/ledger-service
    container_name: ledger-service
    ports:
      - "8002:8000"
    env_file:
      - ./services/ledger-service/.env
    depends_on:
      - mysql

  ocr-ai-service:
    build: ./services/ocr-ai-service
    container_name: ocr-ai-service
    ports:
      - "8003:8000"

volumes:
  mysql-data: