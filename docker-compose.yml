version: "3.9"

services:

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - ledger-service
      - ocr-ai-service

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "8001:8000"
    env_file:
      - ./services/auth-service/.env

  ledger-service:
    build: ./services/ledger-service
    container_name: ledger-service
    ports:
      - "8002:8000"
    env_file:
      - ./services/ledger-service/.env
    depends_on:
      - ocr-ai-service

  ocr-ai-service:
    build: ./services/ocr-ai-service
    container_name: ocr-ai-service
    ports:
      - "8003:8000"
    env_file:
      - ./services/ocr-ai-service/.env