<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>AWS Ledger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="css/base.css?v=20260311-1" />
    <link rel="stylesheet" href="css/layout.css?v=20260311-1" />
    <link rel="stylesheet" href="css/dashboard.css?v=20260311-1" />
    <link rel="stylesheet" href="css/upload.css?v=20260311-1" />
    <link rel="stylesheet" href="css/receipts.css?v=20260311-1" />
    <link rel="stylesheet" href="css/modal.css?v=20260311-1" />
    <link rel="stylesheet" href="css/subscription.css?v=20260311-1" />
    <link rel="stylesheet" href="css/settings.css?v=20260311-1" />
    <style>
      @media (max-width: 1024px), (hover: none) and (pointer: coarse) {
        body:not(.sidebar-open) .sidebar {
          transform: translateX(-100%) !important;
        }

        .mobile-menu-btn {
          display: inline-flex !important;
          flex-direction: column;
        }

        .sidebar {
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          bottom: 0 !important;
          width: min(280px, 82vw) !important;
          height: 100vh !important;
          height: 100dvh !important;
          z-index: 1000 !important;
          box-shadow: 16px 0 42px rgba(15, 23, 42, 0.28) !important;
          overflow: hidden !important;
        }

        .app-layout {
          display: block !important;
        }

        main {
          width: 100% !important;
          padding-top: calc(76px + env(safe-area-inset-top, 0px)) !important;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <script>
      (function () {
        const ua = navigator.userAgent || "";
        const mobileUa = /Android|iPhone|iPad|iPod|Mobile|SamsungBrowser|CriOS|FxiOS/i.test(ua);
        const smallViewport = window.matchMedia("(max-width: 1024px)").matches;
        const coarsePointer = window.matchMedia("(hover: none) and (pointer: coarse)").matches;
        if (coarsePointer || (mobileUa && smallViewport)) {
          document.body.classList.add("mobile-layout");
        }
      })();
    </script>
    <div class="app-layout">
      <button
        id="mobileMenuBtn"
        class="mobile-menu-btn"
        type="button"
        aria-label="메뉴 열기"
        aria-controls="sidebar"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div id="sidebarOverlay" class="sidebar-overlay"></div>

      <aside id="sidebar" class="sidebar" aria-label="주 메뉴">
        <div class="logo">AWS Ledger</div>

        <nav>
          <a href="#/dashboard" class="nav-link">대시보드</a>
          <a href="#/receipts" class="nav-link">거래내역</a>
          <a href="#/upload" class="nav-link">업로드</a>
          <a href="#/settings" class="nav-link">설정</a>
        </nav>

        <button id="logoutBtn" class="logout-btn">로그아웃</button>
      </aside>

      <main id="app-content"></main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="js/app.js?v=20260311-1"></script>
  </body>
</html>
