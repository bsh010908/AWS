<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AWS Ledger Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>

  <div class="layout">

    <div class="header">
      <div class="brand">AWS Ledger</div>

      <div class="header-right">
        <div class="plan-badge" id="planBadge">...</div>
        <button class="ghost-btn" id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <div class="kpi-section">
      <div class="kpi-card highlight">
        <span>총 지출</span>
        <h2 id="totalAmount">0 원</h2>
      </div>

      <div class="kpi-card">
        <span>이번 달 영수증 수</span>
        <h2 id="receiptCount">0 건</h2>
      </div>

      <div class="kpi-card">
        <span>최대 소비 카테고리</span>
        <h2 id="topCategory">-</h2>
      </div>
    </div>

    <div class="main-section">

      <!-- 🔥 차트 영역 수정 -->
      <div class="chart-card">

        <!-- 제목 + 월 선택 -->
        <div class="chart-header">
          <h3>카테고리별 소비</h3>

          <!-- 🔥 월 선택 드롭다운 -->
          <select id="monthSelect">
            <!-- JS에서 1~12월 자동 생성 -->
          </select>
        </div>

        <div class="chart-wrapper">
          <canvas id="categoryChart"></canvas>
        </div>

      </div>

      <div class="recent-card">
        <h3>최근 소비</h3>
        <div id="recentList"></div>
      </div>

    </div>

  </div>

  <script type="module" src="./js/dashboard.js"></script>

</body>
</html>
