<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>AWS Ledger Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./css/dashboard.css" />
  </head>
  <body>
    <div class="layout">

      <div class="header">
        <div class="brand">AWS Ledger</div>
        <div class="header-right">
          <div class="plan-badge" id="planBadge">PRO</div>
          <button class="ghost-btn" id="logoutBtn">로그아웃</button>
        </div>
      </div>

      <!-- KPI -->
      <div class="kpi-section">
        <div class="kpi-card highlight">
          <span>총 지출</span>
          <h2 id="totalAmount">0 원</h2>
          <div id="monthCompare" class="month-compare"></div>
        </div>

        <div class="kpi-card">
          <span>이번 달 영수증 수</span>
          <h2 id="receiptCount">0 건</h2>
        </div>

        <div class="kpi-card">
          <span>최대 소비 카테고리</span>
          <h2 id="topCategory">-</h2>
        </div>
      </div>

      <!-- 차트 영역 -->
      <div class="main-section">

        <div class="chart-card">
          <div class="chart-header">
            <h3>카테고리별 소비</h3>
            <select id="monthSelect"></select>
          </div>
          <div class="chart-wrapper">
            <canvas id="categoryChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>일별 소비</h3>
          <div class="chart-wrapper">
            <canvas id="dailyChart"></canvas>
          </div>
        </div>

      </div>

      <!-- 하단 -->
      <div class="bottom-section">

        <div class="recent-card">
          <h3>최근 소비</h3>
          <div id="recentList"></div>
        </div>

        <div class="predict-card">
          <span>이번 달 예상 지출</span>
          <h2 id="predictedAmount">0 원</h2>
          <small id="avgDailyText"></small>
        </div>

      </div>

    </div>

    <script type="module" src="./js/dashboard.js"></script>
  </body>
</html>
